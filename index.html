<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX - Pure VR Architecture</title>
    <style>
        :root {
            --sgx-yellow: #FDCC0D;
            --sgx-blue: #32527B;
            --sgx-bg: #050505;
            --glass: rgba(20, 20, 20, 0.85);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--sgx-bg);
            font-family: 'Courier New', Courier, monospace;
            color: var(--sgx-yellow);
        }

        #scene-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI Nativo SGX */
        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .sgx-panel {
            background: var(--glass);
            border: 1px solid var(--sgx-blue);
            border-top: 4px solid var(--sgx-yellow);
            border-radius: 8px;
            padding: 50px;
            text-align: center;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 20px rgba(50, 82, 123, 0.4);
        }

        .sgx-panel h1 { margin: 0 0 10px 0; font-size: 2.2rem; letter-spacing: 4px; font-weight: 900; color: #fff; }
        .sgx-panel p { color: #888; margin-bottom: 30px; font-size: 0.85rem; letter-spacing: 1px; }

        button.sgx-btn {
            background: var(--sgx-yellow); color: #000;
            border: none; padding: 20px; font-size: 1.2rem;
            font-weight: 900; font-family: inherit; cursor: pointer;
            border-radius: 4px; text-transform: uppercase;
            width: 100%; transition: all 0.2s; letter-spacing: 2px;
        }
        button.sgx-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(253, 204, 13, 0.4); }

        /* Escondemos el botón default de WebXR */
        #VRButton { display: none !important; }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="scene-container"></div>

    <div id="ui-layer">
        <div class="sgx-panel">
            <h1>INFINITE BORIKUA</h1>
            <p>SISTEMA ESPACIAL INMERSIVO<br><span style="color: var(--sgx-blue);">VR-First Architecture</span></p>
            <button id="btn-start-vr" class="sgx-btn">INICIAR ENLACE VR</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        // --- CORE ENGINE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.015);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.xr.enabled = true;
        document.getElementById('scene-container').appendChild(renderer.domElement);

        // --- UI HIJACKING ---
        // Instanciamos el botón VR pero lo escondemos con CSS
        const vrBtnObj = VRButton.createButton(renderer);
        document.body.appendChild(vrBtnObj);
        
        // Conectamos nuestro botón SGX al trigger del visor
        document.getElementById('btn-start-vr').addEventListener('click', () => {
            vrBtnObj.click(); // Fuerza el handshake de WebXR
            document.getElementById('ui-layer').style.display = 'none'; // Desaparece la UI
        });

        // --- PLAYER RIG (CRÍTICO PARA LOCOMOTION) ---
        // En vez de añadir la cámara a la escena, la metemos en un Rig.
        // Moveremos el Rig con el joystick, y la cámara se moverá sola con la cabeza.
        const playerRig = new THREE.Group();
        playerRig.position.set(0, 0, 0);
        scene.add(playerRig);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        playerRig.add(camera);

        // --- ILUMINACIÓN ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const spot = new THREE.SpotLight(0xffffff, 2);
        spot.position.set(0, 10, 5);
        spot.angle = Math.PI / 3;
        scene.add(spot);

        // --- GALERÍA (ESTÁTICA PARA PERFORMANCE VR) ---
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        const w = 26, h = 16, d = 26;
        const boxGeo = new THREE.BoxGeometry(w, h, d);
        const texLoader = new THREE.TextureLoader();
        texLoader.load('https://static.wixstatic.com/media/fe81a7_07aecfdb3b044909b0b267dfe7eecd96~mv2.png', (tex) => {
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(-d * 0.15, h * 0.15);
            const wallMat = new THREE.MeshStandardMaterial({ map: tex, side: THREE.BackSide, color: 0x555555 });
            roomGroup.add(new THREE.Mesh(boxGeo, wallMat));
        });

        const gridBottom = new THREE.GridHelper(Math.max(w, d), 25, 0x32527B, 0x111111);
        gridBottom.position.y = -h / 2 + 0.05;
        roomGroup.add(gridBottom);

        // --- MOTOR DE INTERACCIÓN (RAYCASTING Y CONTROLADORES) ---
        const interactableObjects = [];
        const raycaster = new THREE.Raycaster();
        const tempMatrix = new THREE.Matrix4();

        // Creamos un objeto 3D central para interactuar
        const coreGeo = new THREE.OctahedronGeometry(1.5, 0);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0xFDCC0D, wireframe: true, emissive: 0x32527B, emissiveIntensity: 0.5 });
        const interactiveCore = new THREE.Mesh(coreGeo, coreMat);
        interactiveCore.position.set(0, 1.5, -5);
        interactiveCore.userData.isInteractive = true; // Flag de validación
        scene.add(interactiveCore);
        interactableObjects.push(interactiveCore);

        // Setup de Controladores (Manos)
        const controllerModelFactory = new XRControllerModelFactory();
        const laserMat = new THREE.LineBasicMaterial({ color: 0x00ffa3, linewidth: 2 });
        const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]);

        function setupController(index) {
            const controller = renderer.xr.getController(index);
            controller.addEventListener('selectstart', onSelectStart);
            
            // IMPORTANTE: Los mandos deben ser hijos del PlayerRig para que se muevan contigo
            playerRig.add(controller);

            const grip = renderer.xr.getControllerGrip(index);
            grip.add(controllerModelFactory.createControllerModel(grip));
            playerRig.add(grip);

            const laser = new THREE.Line(laserGeo, laserMat);
            laser.name = 'laser';
            laser.scale.z = 10;
            controller.add(laser);

            return controller;
        }

        const controller1 = setupController(0);
        const controller2 = setupController(1);

        // LÓGICA DE GATILLO (INTERACCIÓN)
        function onSelectStart(event) {
            const controller = event.target;
            
            // Disparar rayo láser matemáticamente
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const hits = raycaster.intersectObjects(interactableObjects, false);

            if (hits.length > 0) {
                const hitObject = hits[0].object;
                
                if (hitObject.userData.isInteractive) {
                    // Dopamina visual: Cambia color y escala temporalmente
                    hitObject.material.color.setHex(Math.random() * 0xffffff);
                    hitObject.scale.multiplyScalar(1.2);
                    setTimeout(() => hitObject.scale.multiplyScalar(1/1.2), 150);

                    // Dopamina física: Haptic Feedback (Vibración)
                    const session = renderer.xr.getSession();
                    if (session && event.data && event.data.gamepad) {
                        const hapticActuator = event.data.gamepad.hapticActuators?.[0];
                        if (hapticActuator) hapticActuator.pulse(1.0, 100); // Fuerza 1.0, 100ms
                    }
                }
            }
        }

        // --- SISTEMA DE LOCOMOTION (JOYSTICK MOVEMENT) ---
        const moveSpeed = 0.05;
        const playerDirection = new THREE.Vector3();
        const playerRight = new THREE.Vector3();

        function handleLocomotion() {
            const session = renderer.xr.getSession();
            if (!session) return;

            // Extraer datos de los mandos
            for (const source of session.inputSources) {
                if (source && source.gamepad) {
                    // Los ejes de los pulgares (Thumbsticks) suelen ser el índice 2 (X) y 3 (Y)
                    const xAxis = source.gamepad.axes[2]; 
                    const yAxis = source.gamepad.axes[3]; 

                    // Zona muerta para evitar drift (movimiento fantasma)
                    if (Math.abs(xAxis) > 0.1 || Math.abs(yAxis) > 0.1) {
                        
                        // Determinar hacia dónde está mirando el casco (Head-Steering)
                        camera.getWorldDirection(playerDirection);
                        playerDirection.y = 0; // Evita que vueles o te entierres
                        playerDirection.normalize();

                        // Calcular el vector "Derecha" en base a dónde miras
                        playerRight.crossVectors(camera.up, playerDirection).normalize();

                        // Aplicar la traslación al PlayerRig
                        playerRig.position.addScaledVector(playerDirection, -yAxis * moveSpeed);
                        playerRig.position.addScaledVector(playerRight, xAxis * moveSpeed);
                    }
                }
            }
        }

        // --- HOVER LÁSER EN TIEMPO REAL ---
        function updateLasers(controller) {
            if (!controller) return;
            const laser = controller.getObjectByName('laser');
            
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const hits = raycaster.intersectObjects(interactableObjects, false);
            
            // Si el láser choca con el objeto, acórtalo. Si no, hazlo de 10 metros.
            if (hits.length > 0) {
                laser.scale.z = hits[0].distance;
            } else {
                laser.scale.z = 10;
            }
        }

        // --- RENDER LOOP (VR NATIVO) ---
        renderer.setAnimationLoop(() => {
            // Rotación suave del núcleo para darle vida
            interactiveCore.rotation.x += 0.005;
            interactiveCore.rotation.y += 0.005;

            if (renderer.xr.isPresenting) {
                handleLocomotion(); // Chequea el joystick cada frame
                updateLasers(controller1);
                updateLasers(controller2);
            }

            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
